<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فرم تایید اطلاعات</title>

<link rel="stylesheet" href="file/info.css">

</head>
<body>

<form id="myForm">

    <div class="form-header">

    <div class="logo-box">
        <img src="file/images/logo.png" alt="لوگو سازمان">
    </div>

    <div class="header-text">
        <h2>فرم تایید اطلاعات</h2>
        <p>لطفاً اطلاعات را به‌صورت کامل و صحیح ثبت نمایید</p>
    </div>

</div>

    <label>نام</label>
    <input type="text" name="firstName" required>

    <label>نام خانوادگی</label>
    <input type="text" name="lastName" required>

    <label>شماره موبایل</label>
    <input type="tel"
           name="mobile"
           pattern="09[0-9]{9}"
           maxlength="11"
           minlength="11"
           required>

    <label>کد پرسنلی</label>
    <input type="text" name="personnelCode" required>

    <label>کد ملی</label>
    <input type="text"
           name="nationalCode"
           pattern="[0-9]{10}"
           maxlength="10"
           minlength="10"
           required>

    <label>کد ملی فرد اصلی</label>
    <input type="text"
           name="mainNationalCode"
           pattern="[0-9]{10}"
           maxlength="10"
           minlength="10"
           required>

<label>نسبت</label>
<select name="relation" required>
    <option value="">انتخاب نمایید</option>
    <option value="فرد اصلی">فرد اصلی</option>
    <option value="همسر">همسر</option>
    <option value="فرزند">فرزند</option>
    <option value="پدر">پدر</option>
    <option value="مادر">مادر</option>
    <option value="سایر">سایر</option>
</select>

    <label>جنسیت</label>
<select name="gender" required>
    <option value="">انتخاب نمایید</option>
    <option value="مرد">مرد</option>
    <option value="زن">زن</option>
</select>

    <label>سن (اختیاری)</label>
    <input type="number" name="age" min="1" max="120">

    
<label>شرایط خاص</label>
<select name="specialCondition" required>
    <option value="">انتخاب نمایید</option>
    <option value="دارد">دارد</option>
    <option value="ندارد">ندارد</option>
</select>

    <label>محل سکونت</label>
    <textarea name="residence" required></textarea>

    <input type="hidden" name="formId" value="admin_saljoghi">

    <button type="submit">ثبت اطلاعات</button>

</form>

<script src="file/info.js"></script>

</body>
</html>
