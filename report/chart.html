<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>نمودار سهم رشته های ورشی</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/highcharts-3d.js"></script>
<style>
body{font-family:Tahoma,sans-serif;background:#f5f5f5;margin:0;padding:24px}
#container{height:700px;max-width:1100px;margin:auto;background:#fff;border-radius:16px;padding:20px}
.note{max-width:1100px;margin:12px auto;color:#555}
</style>
</head>
<body>
<div id="container"></div>

<script>
Highcharts.chart('container', {
  chart: {
    type: 'pie',
    options3d: { enabled: true, alpha: 50, beta: 0 }
  },
  title: { text: 'نمودار سهم رشته های ورشی' },
  tooltip: { pointFormat: '<b>{point.y}</b>' },
  plotOptions: {
    pie: {
      allowPointSelect: true,
      depth: 45,
      dataLabels: {
        enabled: true,
        format: '{point.name}: {point.y}'
      }
    }
  },
  series: [{
    name: 'تعداد',
    data: [
      ['شنا', 26],
      ['فوتسال', 10],
      ['بدمینتون', 4],
      ['دارت', 2],
      ['تنیس روی میز', 2],
      ['آمادگی جسمانی', 9],
      ['بدنسازی', 30],
      ['شطرنج', 1],
      ['کشتی', 1],
      ['تیراندازی', 1],
      ['والیبال', 14]
    ]
  }]
});
</script>
</body>
</html>
